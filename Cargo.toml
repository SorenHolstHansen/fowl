[workspace]
members = [
  "fowl",
  "libs/*"
]
resolver = "3"

[workspace.dependencies]
anyhow = "1"
ast = { path = "libs/ast" }
codegen = { path = "libs/codegen" }
error = { path = "libs/error" }
lexer = { path = "libs/lexer" }
module = { path = "libs/module" }
parser = { path = "libs/parser" }
span = { path = "libs/span" }
